<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线取色器_HEXRGBHSL颜色转换 | DevTools</title>
<meta name="description" content="免费在线取色器和颜色转换工具，支持HEX/RGB/HSL格式互转，浏览器端完成。">
<link rel="stylesheet" href="../style.css">
<style>.color-preview { width:100%; height:80px; border-radius:var(--radius-sm); margin:8px 0; transition:background 0.2s; }</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand"><span class="icon">🔧</span> DevTools</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>
</nav>
<div class="container">
  <div class="tool-page">
    <div class="breadcrumb"><a href="/">首页</a> / 取色器 & 颜色转换</div>
    <div class="tool-header"><h2>🎨 取色器 & 颜色转换</h2><p>颜色选择与 HEX / RGB / HSL 相互转换</p></div>
    <div class="tool-panel" style="padding:20px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <input type="color" id="picker" value="#4263eb" oninput="fromPicker()" style="width:60px;height:60px">
        <div>
          <div style="font-weight:700;font-size:1.4rem" id="hexVal">#4263EB</div>
          <div style="color:var(--text-secondary);font-size:0.85rem" id="rgbVal">RGB(66, 99, 235)</div>
          <div style="color:var(--text-secondary);font-size:0.85rem" id="hslVal">HSL(228°, 81%, 59%)</div>
        </div>
      </div>
      <div class="color-preview" id="preview" style="background:#4263eb"></div>
    </div>
    <div class="ad-slot horizontal">📢 广告位</div>
    <div class="tool-panel" style="padding:20px">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
        <input type="text" id="hexInput" placeholder="#RRGGBB" value="#4263EB" style="padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text);font-family:monospace;width:140px">
        <button class="btn btn-primary btn-sm" onclick="fromHex()">应用 HEX</button>
        <span style="font-size:0.82rem;color:var(--text-secondary)">或输入 RGB: </span>
        <input type="text" id="rgbInput" placeholder="66,99,235" style="width:120px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text);font-family:monospace">
        <button class="btn btn-sm" onclick="fromRGB()">应用 RGB</button>
      </div>
    </div>
  </div>
</div>
<footer class="footer"><p>© 2026 DevTools</p></footer>
<script src="../script.js"></script>
<script>
function hexToRGB(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbToHex(r,g,b) { return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0').toUpperCase()).join(''); }
function rgbToHSL(r,g,b) {
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/2;
  if(max===min) return {h:0,s:0,l:Math.round(l*100)};
  const d=max-min, s=l>0.5?d/(2-max-min):d/(max+min);
  let h; switch(max){ case r: h=((g-b)/d+(g<b?6:0));break; case g: h=((b-r)/d+2);break; case b: h=((r-g)/d+4);break; }
  return {h:Math.round(h*60), s:Math.round(s*100), l:Math.round(l*100)};
}
function updateAll(hex) {
  const {r,g,b} = hexToRGB(hex);
  const {h,s,l} = rgbToHSL(r,g,b);
  document.getElementById('picker').value = hex.toLowerCase();
  document.getElementById('hexVal').textContent = hex;
  document.getElementById('rgbVal').textContent = 'RGB('+r+', '+g+', '+b+')';
  document.getElementById('hslVal').textContent = 'HSL('+h+'°, '+s+'%, '+l+'%)';
  document.getElementById('preview').style.background = hex;
  document.getElementById('hexInput').value = hex;
  document.getElementById('rgbInput').value = r+','+g+','+b;
}
function fromPicker() { updateAll(document.getElementById('picker').value.toUpperCase()); }
function fromHex() {
  let v = document.getElementById('hexInput').value.trim();
  if(!v.startsWith('#')) v = '#'+v;
  if(/^#[0-9a-fA-F]{6}$/.test(v)) updateAll(v.toUpperCase());
  else showToast('无效的 HEX 颜色值');
}
function fromRGB() {
  const parts = document.getElementById('rgbInput').value.split(',').map(Number);
  if(parts.length===3 && parts.every(n=>n>=0&&n<=255)) updateAll(rgbToHex(parts[0],parts[1],parts[2]));
  else showToast('无效的 RGB 值，格式: 66,99,235');
}
</script>
</body>
</html>
