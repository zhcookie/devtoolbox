<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片转Base64在线_图片编码DataURL | DevTools</title>
<meta name="description" content="免费在线图片转Base64工具，将图片文件转为Base64编码字符串，浏览器端完成，图片不上传。">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand"><span class="icon">🔧</span> DevTools</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>
</nav>
<div class="container">
  <div class="tool-page">
    <div class="breadcrumb"><a href="/">首页</a> / 图片转 Base64</div>
    <div class="tool-header"><h2>🖼️ 图片转 Base64</h2><p>将图片文件转为 Base64 编码字符串 — 图片不上传</p></div>
    <div class="drop-zone" id="dropZone" style="margin:10px 0" onclick="document.getElementById('fileInput').click()">
  <div class="drop-icon">📁</div>
  <div>拖拽图片到此处，或点击选择文件</div>
  <input type="file" id="fileInput" accept="image/*" onchange="convert()" style="display:none">
</div>
    <div class="ad-slot horizontal">📢 广告位</div>
    <div class="tool-body">
      <div class="tool-panel">
        <div class="tool-panel-header"><span>📥 预览</span></div>
        <div style="text-align:center;padding:14px"><img id="preview" style="max-width:100%;max-height:300px" alt="选择图片"></div>
      </div>
      <div class="tool-panel">
        <div class="tool-panel-header"><span>📤 Base64 编码</span><button class="btn btn-sm" onclick="copyOutput()">📋 复制</button></div>
        <div class="output-area" id="output" style="font-size:0.78rem;word-break:break-all"></div>
      </div>
    </div>
  </div>
</div>
<footer class="footer"><p>© 2026 DevTools</p></footer>
<script src="../script.js"></script>
<script>setupDropZone();function setupDropZone(){const dz=document.getElementById("dropZone");if(!dz)return;const fi=document.getElementById("fileInput");dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag-over")});dz.addEventListener("dragleave",()=>{dz.classList.remove("drag-over")});dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag-over");if(e.dataTransfer.files.length)fi.files=e.dataTransfer.files;convert()})}</script>
<script>
async function convert() {
  const file = document.getElementById('fileInput').files[0];
  if(!file) return;
  document.getElementById('preview').src = URL.createObjectURL(file);
  const dataUrl = await readFileAsDataURL(file);
  document.getElementById('output').textContent = dataUrl;
}
function copyOutput() { copyText(document.getElementById('output').textContent); }
</script>
</body>
</html>
