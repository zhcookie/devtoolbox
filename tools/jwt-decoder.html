<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT在线解码器_Token解析HeaderPayload | DevTools</title>
<meta name="description" content="免费在线JWT解码工具，解析JWT Token的Header和Payload，浏览器端完成，Token不上传。">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<nav class="navbar"><div class="navbar-inner"><a href="/" class="navbar-brand"><span class="icon">🔧</span> DevTools</a><button class="theme-toggle" onclick="toggleTheme()">🌓</button></div></nav>
<div class="container">
  <div class="tool-page">
    <div class="breadcrumb"><a href="/">首页</a> / JWT 解码器</div>
    <div class="tool-header"><h2>🎫 JWT 解码器</h2><p>解析 JWT Token 的 Header 和 Payload — Token 不上传</p></div>
    <div class="ad-slot horizontal">📢 广告位</div>
    <div class="tool-panel">
      <div class="tool-panel-header"><span>📥 粘贴 JWT Token</span></div>
      <textarea id="input" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." oninput="decode()" style="min-height:100px;font-size:0.8rem"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="tool-panel"><div class="tool-panel-header">📋 Header</div><div class="output-area" id="headerOut" style="min-height:120px;padding:14px"></div></div>
      <div class="tool-panel"><div class="tool-panel-header">📦 Payload</div><div class="output-area" id="payloadOut" style="min-height:120px;padding:14px"></div></div>
    </div>
    <div class="tool-panel" id="sigPanel" style="display:none"><div class="tool-panel-header">🔏 Signature (无法验证，仅供查看)</div><div class="output-area" id="sigOut" style="min-height:40px;padding:10px;font-size:0.78rem;word-break:break-all"></div></div>
  </div>
</div>
<footer class="footer"><p>© 2026 DevTools</p></footer>
<script src="../script.js"></script>
<script>
function decode() {
  const v = document.getElementById('input').value.trim();
  const parts = v.split('.');
  if (parts.length !== 3) {
    document.getElementById('headerOut').innerHTML = '<span style="color:var(--text-secondary)">等待有效 Token...</span>';
    document.getElementById('payloadOut').innerHTML = '<span style="color:var(--text-secondary)">等待有效 Token...</span>';
    document.getElementById('sigPanel').style.display = 'none';
    return;
  }
  try {
    const header = JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
    const payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
    document.getElementById('headerOut').textContent = JSON.stringify(header, null, 2);
    document.getElementById('payloadOut').textContent = JSON.stringify(payload, null, 2);
    document.getElementById('sigOut').textContent = parts[2];
    document.getElementById('sigPanel').style.display = '';
    // Check expiry
    if (payload.exp) {
      const exp = new Date(payload.exp * 1000);
      const now = new Date();
      const expText = exp > now ? ' ✅ 未过期' : ' ❌ 已过期';
      document.getElementById('payloadOut').textContent += '\n\n---\n过期时间: ' + exp.toLocaleString() + expText;
    }
  } catch(e) {
    document.getElementById('headerOut').innerHTML = '<span style="color:var(--danger)">解码失败：' + e.message + '</span>';
  }
}
</script>
</body>
</html>
