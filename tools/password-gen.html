<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机密码在线生成器_高强度密码 | DevTools</title>
<meta name="description" content="免费在线随机密码生成器，可自定义长度和字符类型，生成高强度密码，浏览器端完成。">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand"><span class="icon">🔧</span> DevTools</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>
</nav>
<div class="container">
  <div class="tool-page">
    <div class="breadcrumb"><a href="/">首页</a> / 随机密码生成</div>
    <div class="tool-header"><h2>🔑 随机密码生成</h2><p>生成高强度随机密码，可自定义长度和字符类型</p></div>
    <div class="tool-panel" style="padding:20px">
      <div style="display:grid;gap:12px;max-width:500px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="width:80px;font-size:0.88rem">密码长度：</span>
          <input type="range" id="length" min="8" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value;gen()">
          <span id="lenVal" style="font-weight:600">16</span>
        </div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <label><input type="checkbox" id="upper" checked onchange="gen()"> 大写字母 (A-Z)</label>
          <label><input type="checkbox" id="lower" checked onchange="gen()"> 小写字母 (a-z)</label>
          <label><input type="checkbox" id="digits" checked onchange="gen()"> 数字 (0-9)</label>
          <label><input type="checkbox" id="symbols" onchange="gen()"> 特殊符号 (!@#$)</label>
        </div>
        <div class="tool-panel" style="padding:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <code id="password" style="font-size:1.3rem;word-break:break-all;font-weight:700"></code>
          <button class="btn btn-primary" onclick="copyOutput()">📋 复制</button>
        </div>
        <div id="strength" style="font-size:0.85rem"></div>
      </div>
      <button class="btn" onclick="gen()" style="margin-top:10px">🎲 重新生成</button>
    </div>
    <div class="ad-slot horizontal">📢 广告位</div>
  </div>
</div>
<footer class="footer"><p>© 2026 DevTools</p></footer>
<script src="../script.js"></script>
<script>
function gen() {
  const len = parseInt(document.getElementById('length').value);
  let chars = '';
  if(document.getElementById('upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('digits').checked) chars += '0123456789';
  if(document.getElementById('symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
  if(!chars) { document.getElementById('password').textContent = '请至少选择一种字符类型'; return; }
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  let pw = '';
  for(let i=0;i<len;i++) pw += chars[arr[i] % chars.length];
  document.getElementById('password').textContent = pw;

  // Strength
  const pool = chars.length;
  const entropy = Math.log2(pool) * len;
  let s,bg;
  if(entropy<40) { s='弱'; bg='var(--danger)'; }
  else if(entropy<60) { s='一般'; bg='var(--warning)'; }
  else if(entropy<80) { s='强'; bg='var(--success)'; }
  else { s='非常强 🔒'; bg='var(--success)'; }
  document.getElementById('strength').innerHTML = '强度：<span style="color:'+bg+';font-weight:700">'+s+'</span> (熵: '+entropy.toFixed(1)+' bits)';
}
function copyOutput() { copyText(document.getElementById('password').textContent); }
gen();
</script>
</body>
</html>
