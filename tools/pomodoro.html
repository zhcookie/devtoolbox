  remaining = isBreak ? BREAK_TIME : WORK_TIME;
  total = remaining;
  statusLabel.textContent = isBreak ? '☕ 休息中' : '🍅 工作中';
  statusLabel.style.color = isBreak ? 'var(--success)' : '';
  btnStart.textContent = '▶ 开始';
  updateDisplay();
}

function updateDisplay() {
  const m = Math.floor(remaining / 60), s = remaining % 60;
  timeDisplay.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  const offset = CIRCUMFERENCE * (1 - remaining / total);
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = isBreak ? 'var(--success)' : 'var(--primary)';
}

function toggleSound() { soundOn = !soundOn; document.getElementById('btnSound').textContent = soundOn ? '🔊 音效' : '🔇 静音'; }
updateDisplay();
Notification.requestPermission();
</script>
</body>
