<link rel="stylesheet" href="../style.css">
<style>
:root { --bg: #f5f5f5; --text: #333; --text2: #666; --card: #fff; --border: #e0e0e0; --accent: #6366f1; --accent2: #8b5cf6; --shadow: 0 2px 8px rgba(0,0,0,.08); --preview-bg: #e8e8e8; }
.dark { --bg: #1a1a2e; --text: #e0e0e0; --text2: #999; --card: #222240; --border: #333; --preview-bg: #12121f; }
body { background: var(--bg); color: var(--text); margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; }
.navbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.navbar-brand { font-weight: 700; font-size: 1.1rem; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 8px; }
.theme-toggle { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 1rem; color: var(--text); }
.editor-wrap { display: flex; height: calc(100vh - 52px); overflow: hidden; }
.panel-left { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--preview-bg); position: relative; overflow: auto; padding: 40px; }
.panel-right { width: 320px; background: var(--card); border-left: 1px solid var(--border); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.drop-zone { width: 480px; max-width: 90%; aspect-ratio: 16/10; border: 3px dashed var(--border); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: .2s; color: var(--text2); gap: 12px; background: var(--card); }
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(99,102,241,.05); }
.drop-zone .icon { font-size: 3rem; }
.drop-zone .hint { font-size: 0.8rem; }
.preview-container { position: relative; display: inline-block; }
.preview-container canvas { display: block; max-width: 90vw; max-height: 70vh; }
.section-title { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); margin-bottom: 2px; }
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-row { display: flex; align-items: center; gap: 8px; }

.ctrl-row input[type=range] { flex: 1; accent-color: var(--accent); }
.ctrl-row input[type=color] { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; padding: 2px; }
.ctrl-row input[type=number] { width: 56px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.8rem; background: var(--bg); color: var(--text); text-align: center; }
.ctrl-row select, .ctrl-row button { padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.78rem; cursor: pointer; background: var(--bg); color: var(--text); }
.btn-primary { background: var(--accent) !important; color: #fff !important; border: none !important; font-weight: 600; padding: 10px 20px !important; width: 100%; border-radius: 10px !important; font-size: 0.9rem !important; }
.btn-sm { padding: 5px 12px !important; font-size: 0.75rem !important; }
.preset-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.78rem; background: var(--bg); color: var(--text); white-space: nowrap; }
.preset-btn.active { border-color: var(--accent); background: rgba(99,102,241,.1); color: var(--accent); font-weight: 600; }
.preset-row { display: flex; flex-wrap: wrap; gap: 6px; }
.frame-preset { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.78rem; background: var(--bg); color: var(--text); }
.frame-preset.active { border-color: var(--accent); background: rgba(99,102,241,.1); }
.annotation-bar { display: none; }
.annotation-bar.show { display: flex; gap: 6px; flex-wrap: wrap; }
input[type=text] { flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.78rem; background: var(--bg); color: var(--text); }
.ann-list { max-height: 120px; overflow-y: auto; font-size: 0.75rem; }
.ann-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border); }
.ann-item button { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.9rem; }
@media (max-width: 768px) { .editor-wrap { flex-direction: column; } .panel-right { width: 100%; max-height: 45vh; } .panel-left { padding: 20px; } }
</style>

<body>

<nav class="navbar">
  <a href="/" class="navbar-brand"><span>🔧</span> DevTools</a>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:0.78rem;color:var(--text2)">📸 截图美化器</span>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>
  </div>
</nav>

<div class="editor-wrap">
  <!-- Preview area -->
  <div class="panel-left" id="previewArea">
    <div class="drop-zone" id="dropZone">
      <div class="icon">📸</div>
      <div><strong>拖拽截图到此处</strong> 或点击上传</div>
      <div class="hint">也支持 Ctrl+V 粘贴 · PNG / JPG / WebP</div>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>
    <div class="preview-container" id="previewContainer" style="display:none">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>

  <!-- Controls -->
  <div class="panel-right" id="controlPanel">
    <div class="ctrl-group">
      <div class="section-title">🖼️ 背景</div>
      <div class="preset-row" id="bgPresets">
        <button class="preset-btn active" data-bg="transparent">透明</button>
        <button class="preset-btn" data-bg="white">白色</button>
        <button class="preset-btn" data-bg="black">黑色</button>
        <button class="preset-btn" data-bg="gradient1">紫蓝渐变</button>
        <button class="preset-btn" data-bg="gradient2">日落渐变</button>
        <button class="preset-btn" data-bg="blur">高斯模糊 🔥</button>
        <button class="preset-btn" data-bg="custom">自定义渐变</button>
      </div>
      <div class="ctrl-row" id="customBgRow" style="display:none">
        <label>颜色</label><input type="color" id="bgColor" value="#6366f1">
        <label>渐变2</label><input type="color" id="bgColor2" value="#8b5cf6">
      </div>
      <div class="ctrl-row" id="blurRow" style="display:none">
        <label>模糊度</label>
        <input type="range" id="blurIntensity" min="5" max="80" value="30" oninput="updatePreview()">
        <span style="font-size:0.75rem;min-width:28px" id="blurIntensityVal">30</span>
      </div>
      <div class="ctrl-row">
        <label>内边距</label>
        <input type="range" id="padding" min="0" max="120" value="40" oninput="updatePreview()">
        <span style="font-size:0.75rem;min-width:28px" id="paddingVal">40</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="section-title">🔲 圆角</div>
      <div class="ctrl-row">
        <input type="range" id="borderRadius" min="0" max="80" value="16" oninput="updatePreview()">
        <span style="font-size:0.75rem;min-width:28px" id="radiusVal">16</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="section-title">🌑 阴影</div>
      <div class="ctrl-row">
        <label>大小</label>
        <input type="range" id="shadowBlur" min="0" max="60" value="20" oninput="updatePreview()">
        <span style="font-size:0.75rem;min-width:28px" id="shadowVal">20</span>
      </div>
      <div class="ctrl-row">
        <label>偏移</label>
        <input type="range" id="shadowOffset" min="0" max="30" value="4" oninput="updatePreview()">
        <span style="font-size:0.75rem;min-width:28px" id="shadowOffVal">4</span>
      </div>
      <div class="ctrl-row">
        <label>透明度</label>
        <input type="range" id="shadowOpacity" min="5" max="60" value="25" oninput="updatePreview()">
        <span style="font-size:0.75rem;min-width:28px" id="shadowOpVal">25</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="section-title">📱 设备框</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="frame-preset active" data-frame="none" onclick="selectFrame('none')">🚫 无边框</button>
        <button class="frame-preset" data-frame="mac" onclick="selectFrame('mac')">💻 Mac 窗口</button>
        <button class="frame-preset" data-frame="iphone" onclick="selectFrame('iphone')">📱 iPhone 16</button>
        <button class="frame-preset" data-frame="browser" onclick="selectFrame('browser')">🌐 浏览器窗口</button>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="section-title">✏️ 标注</div>
      <div class="ctrl-row">
        <input type="text" id="annText" placeholder="标注文字..." maxlength="60">
        <select id="annColor">
          <option value="#ff4757">🔴</option>
          <option value="#ff6b81">🩷</option>
          <option value="#ffa502">🟠</option>
          <option value="#2ed573">🟢</option>
          <option value="#1e90ff">🔵</option>
          <option value="#a55eea">🟣</option>
          <option value="#fff" style="color:#000">⚪</option>
          <option value="#000">⚫</option>
        </select>
        <button class="btn-sm" onclick="addAnnotation()" style="background:var(--accent);color:#fff;border:none;border-radius:6px;">添加</button>
        <button class="btn-sm" onclick="clearAnnotations()">清除</button>
      </div>
      <div class="ann-list" id="annList"></div>
    </div>

    <div class="ctrl-group">
      <div class="section-title">📐 尺寸</div>
      <div class="ctrl-row">
        <label>缩放</label>
        <input type="range" id="scale" min="50" max="150" value="100" oninput="updatePreview()">
        <span style="font-size:0.75rem;min-width:36px" id="scaleVal">100%</span>
      </div>
      <div class="ctrl-row">
        <label>画布宽</label>
        <input type="number" id="canvasW" value="1200" onchange="updatePreview()">
        <label>高</label>
        <input type="number" id="canvasH" value="800" onchange="updatePreview()">
      </div>
    </div>

    <button class="btn-primary" onclick="exportPNG()" id="exportBtn" disabled>📥 导出高清 PNG</button>
    <button class="btn-primary" onclick="exportPNG2x()" id="exportBtn2x" disabled style="background:#8b5cf6 !important;margin-top:-8px">📥 导出 2x 高清 (Retina)</button>
    <p style="font-size:0.7rem;color:var(--text2);text-align:center;margin:0">所有处理在浏览器端完成，不上传服务器</p>
  </div>
</div>

<script>
// ===== State =====
let img = null;
let annotations = [];
let currentFrame = 'none';
let currentBg = 'transparent';

// ===== Image Loading =====
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const previewContainer = document.getElementById('previewContainer');
const mainCanvas = document.getElementById('mainCanvas');
const exportBtn = document.getElementById('exportBtn');
const exportBtn2x = document.getElementById('exportBtn2x');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadImage(file);
});

document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) { loadImage(item.getAsFile()); break; }
  }
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      dropZone.style.display = 'none';
      previewContainer.style.display = 'inline-block';
      exportBtn.disabled = false;
      exportBtn2x.disabled = false;
      document.getElementById('canvasW').value = Math.round(img.width * 1.3 + 80);
      document.getElementById('canvasH').value = Math.round(img.height * 1.3 + 80);
      updatePreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ===== Rendering =====
function updatePreview() {
  if (!img) return;
  const ctx = mainCanvas.getContext('2d');
  const padding = parseInt(document.getElementById('padding').value) || 0;
  const radius = parseInt(document.getElementById('borderRadius').value) || 0;
  const shadowBlur = parseInt(document.getElementById('shadowBlur').value) || 0;
  const shadowOffset = parseInt(document.getElementById('shadowOffset').value) || 0;
  const shadowOpacity = parseInt(document.getElementById('shadowOpacity').value) / 100;
  const scale = parseInt(document.getElementById('scale').value) / 100;
  let cw = parseInt(document.getElementById('canvasW').value) || 1200;
  let ch = parseInt(document.getElementById('canvasH').value) || 800;

  // Update value displays
  document.getElementById('paddingVal').textContent = padding;
  document.getElementById('radiusVal').textContent = radius;
  document.getElementById('shadowVal').textContent = shadowBlur;
  document.getElementById('shadowOffVal').textContent = shadowOffset;
  document.getElementById('shadowOpVal').textContent = shadowOpacity * 100;
  document.getElementById('scaleVal').textContent = Math.round(scale * 100) + '%';

  const imgW = img.width * scale;
  const imgH = img.height * scale;
  const totalW = imgW + padding * 2;
  const totalH = imgH + padding * 2;

  // Adjust canvas size
  const canvasPadding = Math.max(shadowBlur * 2 + shadowOffset + radius, 40);
  cw = Math.max(totalW + canvasPadding, 400);
  ch = Math.max(totalH + canvasPadding, 300);
  mainCanvas.width = cw;
  mainCanvas.height = ch;

  ctx.clearRect(0, 0, cw, ch);

  // Background
  const bgX = (cw - totalW) / 2 - shadowBlur / 2 + shadowOffset / 2;
  const bgY = (ch - totalH) / 2 - shadowBlur / 2 + shadowOffset / 2;
  const bgW = totalW + shadowBlur;
  const bgH = totalH + shadowBlur;

  // Draw background based on selection
  if (currentBg === 'transparent') {
    // Checkered pattern
    const sq = 12;
    for (let y = 0; y < ch; y += sq) {
      for (let x = 0; x < cw; x += sq) {
        ctx.fillStyle = ((x / sq + y / sq) % 2 === 0) ? '#e8e8e8' : '#fff';
        ctx.fillRect(x, y, sq, sq);
      }
    }
  } else if (currentBg === 'white') {
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, cw, ch);
  } else if (currentBg === 'black') {
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, cw, ch);
  } else if (currentBg === 'gradient1') {
    const g = ctx.createLinearGradient(0, 0, cw, ch);
    g.addColorStop(0, '#667eea'); g.addColorStop(1, '#764ba2');
    ctx.fillStyle = g; ctx.fillRect(0, 0, cw, ch);
  } else if (currentBg === 'gradient2') {
    const g = ctx.createLinearGradient(0, 0, cw, ch);
    g.addColorStop(0, '#f093fb'); g.addColorStop(1, '#f5576c');
    ctx.fillStyle = g; ctx.fillRect(0, 0, cw, ch);
  } else if (currentBg === 'blur') {
    // Scale original image to cover canvas, then blur
    const blurPx = parseInt(document.getElementById('blurIntensity').value) || 30;
    document.getElementById('blurIntensityVal').textContent = blurPx;
    const coverScale = Math.max(cw / img.width, ch / img.height);
    const bw = img.width * coverScale;
    const bh = img.height * coverScale;
    const bx = (cw - bw) / 2;
    const by = (ch - bh) / 2;
    ctx.filter = `blur(${blurPx}px)`;
    ctx.drawImage(img, bx, by, bw, bh);
    ctx.filter = 'none';
  } else if (currentBg === 'custom') {
    const c1 = document.getElementById('bgColor').value;
    const c2 = document.getElementById('bgColor2').value;
    const g = ctx.createLinearGradient(0, 0, cw, ch);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g; ctx.fillRect(0, 0, cw, ch);
  }

  // Image position
  const ix = (cw - totalW) / 2;
  const iy = (ch - totalH) / 2;
  const iwx = ix + padding;
  const iwy = iy + padding;

  // Draw shadow
  ctx.save();
  ctx.shadowColor = `rgba(0,0,0,${shadowOpacity})`;
  ctx.shadowBlur = shadowBlur;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = shadowOffset;

  // Round rect for the image area + padding
  const rr = (x, y, w, h, r) => {
    ctx.beginPath();
    const maxR = Math.min(w / 2, h / 2);
    r = Math.min(r, maxR);
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  };

  // Fill white rect behind image with shadow
  ctx.fillStyle = '#ffffff';
  rr(ix, iy, totalW, totalH, radius);
  ctx.fill();
  ctx.restore();

  // Draw image (clipped to rounded rect)
  ctx.save();
  rr(iwx, iwy, imgW, imgH, Math.max(0, radius - padding));
  ctx.clip();
  ctx.drawImage(img, iwx, iwy, imgW, imgH);
  ctx.restore();

  // Draw device frame
  if (currentFrame !== 'none') {
    drawFrame(ctx, ix, iy, totalW, totalH, radius);
  }

  // Draw annotations
  annotations.forEach(ann => drawAnnotation(ctx, ann, ix, iy, totalW, totalH));
}

function drawFrame(ctx, x, y, w, h, r) {
  ctx.save();
  const fw = 12; // frame margin
  const fx = x - fw, fy = y - fw - 30, fw2 = w + fw * 2, fh2 = h + fw * 2 + 30;

  if (currentFrame === 'mac') {
    ctx.fillStyle = '#2c2c2e'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
    ctx.beginPath(); roundRectPath(ctx, fx, fy, fw2, fh2, r + 6);
    ctx.fill(); ctx.stroke();
    // Traffic light dots
    ctx.fillStyle = '#ff5f57'; ctx.beginPath(); ctx.arc(fx + 18, fy + 15, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#febc2e'; ctx.beginPath(); ctx.arc(fx + 38, fy + 15, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#28c840'; ctx.beginPath(); ctx.arc(fx + 58, fy + 15, 6, 0, Math.PI * 2); ctx.fill();
  } else if (currentFrame === 'iphone') {
    ctx.fillStyle = '#1c1c1e'; ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
    ctx.beginPath(); roundRectPath(ctx, fx - 4, fy - 12, fw2 + 8, fh2 + 24, r + 20);
    ctx.fill(); ctx.stroke();
    // Notch
    ctx.fillStyle = '#333'; ctx.beginPath();
    roundRectPath(ctx, (fx + fw2 / 2) - 40, fy - 12, 80, 8, 4);
    ctx.fill();
  } else if (currentFrame === 'browser') {
    ctx.fillStyle = '#e8e8ea'; ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
    ctx.beginPath(); roundRectPath(ctx, fx, fy, fw2, fh2, r + 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ff5f57'; ctx.beginPath(); ctx.arc(fx + 16, fy + 15, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#febc2e'; ctx.beginPath(); ctx.arc(fx + 32, fy + 15, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#28c840'; ctx.beginPath(); ctx.arc(fx + 48, fy + 15, 5, 0, Math.PI * 2); ctx.fill();
    // URL bar
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#ddd';
    ctx.beginPath(); roundRectPath(ctx, fx + 70, fy + 8, fw2 - 140, 14, 4);
    ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

function roundRectPath(ctx, x, y, w, h, r) {
  const maxR = Math.min(w / 2, h / 2);
  r = Math.min(r, maxR);
  if (r < 0) r = 0;
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawAnnotation(ctx, ann, bx, by, bw, bh) {
  if (ann.placed) {
    ctx.save();
    const x = ann.x, y = ann.y;
    ctx.fillStyle = ann.color;
    ctx.font = 'bold 16px -apple-system, BlinkMacSystemFont, sans-serif';
    const tw = ctx.measureText(ann.text).width;
    const th = 18;
    // arrow line
    ctx.strokeStyle = ann.color; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + ann.arrowDx, y + ann.arrowDy); ctx.stroke();
    // circle
    ctx.fillStyle = ann.color; ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI * 2); ctx.fill();
    // text bg
    const tx = x + ann.arrowDx + 10, ty = y + ann.arrowDy - th / 2;
    ctx.fillStyle = ann.color;
    ctx.beginPath(); roundRectPath(ctx, tx - 6, ty - 4, tw + 12, th + 10, 6);
    ctx.fill();
    ctx.fillStyle = (ann.color === '#fff' || ann.color === '#ffa502' || ann.color === '#2ed573') ? '#000' : '#fff';
    ctx.fillText(ann.text, tx, ty + th - 2);
    ctx.restore();
  } else {
    // Default placement: top-left with arrow pointing to top-left corner of image
    ann.placed = true;
    ann.x = bx + 20;
    ann.y = by + 20;
    ann.arrowDx = -10;
    ann.arrowDy = -10;
    drawAnnotation(ctx, ann, bx, by, bw, bh);
  }
}

// ===== Controls =====
document.getElementById('padding').addEventListener('input', updatePreview);
document.getElementById('borderRadius').addEventListener('input', updatePreview);
document.getElementById('shadowBlur').addEventListener('input', updatePreview);
document.getElementById('shadowOffset').addEventListener('input', updatePreview);
document.getElementById('shadowOpacity').addEventListener('input', updatePreview);
document.getElementById('scale').addEventListener('input', updatePreview);

// Background presets
document.getElementById('bgPresets').addEventListener('click', e => {
  if (!e.target.dataset.bg) return;
  currentBg = e.target.dataset.bg;
  document.querySelectorAll('#bgPresets .preset-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('customBgRow').style.display = currentBg === 'custom' ? 'flex' : 'none';
  document.getElementById('blurRow').style.display = currentBg === 'blur' ? 'flex' : 'none';
  updatePreview();
});

// Frame selection
function selectFrame(name) {
  currentFrame = name;
  document.querySelectorAll('.frame-preset').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-frame="${name}"]`).classList.add('active');
  updatePreview();
}

// ===== Annotations =====
function addAnnotation() {
  const text = document.getElementById('annText').value.trim();
  if (!text) return;
  const color = document.getElementById('annColor').value;
  annotations.push({ text, color, placed: false, x: 0, y: 0, arrowDx: 0, arrowDy: 0 });
  document.getElementById('annText').value = '';
  updateAnnotationList();
  updatePreview();
}

function clearAnnotations() {
  annotations = [];
  updateAnnotationList();
  updatePreview();
}

function updateAnnotationList() {
  const list = document.getElementById('annList');
  list.innerHTML = annotations.map((a, i) =>
    `<div class="ann-item"><span style="color:${a.color}">● ${a.text}</span><button onclick="removeAnn(${i})">✕</button></div>`
  ).join('');
}

function removeAnn(i) { annotations.splice(i, 1); updateAnnotationList(); updatePreview(); }

// ===== Export =====
function exportPNG() { doExport(1); }
function exportPNG2x() { doExport(2); }

function doExport(scale) {
  if (!img) return;
  // Render at export resolution
  const padding = parseInt(document.getElementById('padding').value) || 0;
  const radius = parseInt(document.getElementById('borderRadius').value) || 0;
  const shadowBlur = parseInt(document.getElementById('shadowBlur').value) || 0;
  const shadowOffset = parseInt(document.getElementById('shadowOffset').value) || 0;
  const shadowOpacity = parseInt(document.getElementById('shadowOpacity').value) / 100;
  const imgScale = parseInt(document.getElementById('scale').value) / 100 * scale;

  const imgW = img.width * imgScale;
  const imgH = img.height * imgScale;
  const totalW = imgW + padding * 2;
  const totalH = imgH + padding * 2;
  const cw = totalW + Math.max(shadowBlur * 2 + shadowOffset + radius, 40);
  const ch = totalH + Math.max(shadowBlur * 2 + shadowOffset + radius, 40);

  const expCanvas = document.createElement('canvas');
  expCanvas.width = cw;
  expCanvas.height = ch;
  const ctx = expCanvas.getContext('2d');

  // Same rendering logic as preview but at export resolution
  const bgX = (cw - totalW) / 2 - shadowBlur / 2 + shadowOffset / 2;
  const bgY = (ch - totalH) / 2 - shadowBlur / 2 + shadowOffset / 2;
  const bgW = totalW + shadowBlur;
  const bgH = totalH + shadowBlur;

  if (currentBg === 'transparent') {
    // For PNG export, use actual transparent background
    ctx.clearRect(0, 0, cw, ch);
  } else if (currentBg === 'white') {
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, cw, ch);
  } else if (currentBg === 'black') {
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, cw, ch);
  } else if (currentBg === 'gradient1') {
    const g = ctx.createLinearGradient(0, 0, cw, ch);
    g.addColorStop(0, '#667eea'); g.addColorStop(1, '#764ba2');
    ctx.fillStyle = g; ctx.fillRect(0, 0, cw, ch);
  } else if (currentBg === 'gradient2') {
    const g = ctx.createLinearGradient(0, 0, cw, ch);
    g.addColorStop(0, '#f093fb'); g.addColorStop(1, '#f5576c');
    ctx.fillStyle = g; ctx.fillRect(0, 0, cw, ch);
  } else if (currentBg === 'blur') {
    const blurPx = parseInt(document.getElementById('blurIntensity')?.value) || 30;
    const coverScale = Math.max(cw / img.width, ch / img.height);
    const bw = img.width * coverScale;
    const bh = img.height * coverScale;
    const bx = (cw - bw) / 2;
    const by = (ch - bh) / 2;
    ctx.filter = `blur(${blurPx}px)`;
    ctx.drawImage(img, bx, by, bw, bh);
    ctx.filter = 'none';
  } else if (currentBg === 'custom') {
    const c1 = document.getElementById('bgColor')?.value || '#6366f1';
    const c2 = document.getElementById('bgColor2')?.value || '#8b5cf6';
    const g = ctx.createLinearGradient(0, 0, cw, ch);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g; ctx.fillRect(0, 0, cw, ch);
  }

  const ix = (cw - totalW) / 2;
  const iy = (ch - totalH) / 2;
  const iwx = ix + padding;
  const iwy = iy + padding;

  ctx.save();
  ctx.shadowColor = `rgba(0,0,0,${shadowOpacity})`;
  ctx.shadowBlur = shadowBlur;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = shadowOffset;
  ctx.fillStyle = '#ffffff';
  rr2(ctx, ix, iy, totalW, totalH, radius);
  ctx.fill();
  ctx.restore();

  ctx.save();
  rr2(ctx, iwx, iwy, imgW, imgH, Math.max(0, radius - padding));
  ctx.clip();
  ctx.drawImage(img, iwx, iwy, imgW, imgH);
  ctx.restore();

  if (currentFrame !== 'none') {
    drawFrame(ctx, ix, iy, totalW, totalH, radius);
  }
  annotations.forEach(ann => drawAnnotation(ctx, ann, ix, iy, totalW, totalH));

  expCanvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `screenshot-beautified-${scale}x.png`;
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

function rr2(ctx, x, y, w, h, r) {
  ctx.beginPath();
  const maxR = Math.min(w / 2, h / 2);
  r = Math.min(r, maxR);
  if (r < 0) r = 0;
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== Theme =====
function toggleTheme() { document.body.classList.toggle('dark'); }
