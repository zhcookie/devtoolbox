<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本在线对比工具_Diff差异比较 | DevTools</title>
<meta name="description" content="免费在线文本差异对比工具，逐行比较两段文本，高亮显示差异，浏览器端完成。">
<link rel="stylesheet" href="../style.css">
<style>
.diff-line { padding: 2px 8px; font-family: monospace; font-size:0.85rem; white-space: pre-wrap; }
.diff-add { background: #d3f9d8; color: #2b8a3e; }
.diff-del { background: #ffe3e3; color: #c92a2a; }
.diff-same { color: var(--text-secondary); }
[data-theme="dark"] .diff-add { background: #1a3a1a; color: #69db7c; }
[data-theme="dark"] .diff-del { background: #3a1a1a; color: #ff8787; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand"><span class="icon">🔧</span> DevTools</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>
</nav>
<div class="container">
  <div class="tool-page">
    <div class="breadcrumb"><a href="/">首页</a> / 文本差异对比</div>
    <div class="tool-header"><h2>🔀 文本差异对比</h2><p>逐行对比两段文本，高亮差异 — 浏览器端完成</p></div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="compare()">🔍 对比</button>
      <button class="btn" onclick="clearAll()">🗑️ 清空</button>
    </div>
    <div class="ad-slot horizontal">📢 广告位</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="tool-panel">
        <div class="tool-panel-header"><span>📥 原始文本</span></div>
        <textarea id="input1" style="min-height:250px;font-family:monospace;font-size:0.85rem"></textarea>
      </div>
      <div class="tool-panel">
        <div class="tool-panel-header"><span>📥 新文本</span></div>
        <textarea id="input2" style="min-height:250px;font-family:monospace;font-size:0.85rem"></textarea>
      </div>
    </div>
    <div class="tool-panel" style="margin-top:12px">
      <div class="tool-panel-header"><span>📤 差异结果</span></div>
      <div id="output" style="min-height:200px;padding:12px;font-family:monospace;font-size:0.85rem;overflow-y:auto;max-height:500px"></div>
    </div>
  </div>
</div>
<footer class="footer"><p>© 2026 DevTools</p></footer>
<script src="../script.js"></script>
<script>
function compare() {
  const a = document.getElementById('input1').value.split('\n');
  const b = document.getElementById('input2').value.split('\n');
  const out = document.getElementById('output');
  // Simple LCS diff
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j] = a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  let html = '', i=m, j=n, stack = [];
  while(i>0 || j>0) {
    if(i>0 && j>0 && a[i-1]===b[j-1]) { stack.push({t:'same',v:a[i-1]}); i--; j--; }
    else if(j>0 && (i===0||dp[i][j-1]>=dp[i-1][j])) { stack.push({t:'add',v:b[j-1]}); j--; }
    else { stack.push({t:'del',v:a[i-1]}); i--; }
  }
  stack.reverse();
  let adds=0,dels=0;
  stack.forEach(l => {
    const cls = l.t==='add'?'diff-add':l.t==='del'?'diff-del':'diff-same';
    const prefix = l.t==='add'?'+ ':l.t==='del'?'- ':'  ';
    html += `<div class="diff-line ${cls}">${prefix}${escapeHTML(l.v)||' '}</div>`;
    if(l.t==='add')adds++; if(l.t==='del')dels++;
  });
  out.innerHTML = html || '<span style="color:var(--text-secondary)">两段文本完全相同</span>';
  if(adds||dels) out.innerHTML = `<div style="margin-bottom:8px;font-size:0.85rem">+${adds} 行新增, -${dels} 行删除</div>` + html;
}
function escapeHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clearAll() { document.getElementById('input1').value=''; document.getElementById('input2').value=''; document.getElementById('output').innerHTML=''; }

document.getElementById('input1').value = 'line one\nline two\nline three\nline four';
document.getElementById('input2').value = 'line one\nline two modified\nline three\nline five added';
compare();
</script>
</body>
</html>
