<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL在线解析工具_网址拆分参数 | DevTools</title>
<meta name="description" content="免费在线URL解析工具，拆分网址的协议、域名、端口、路径、参数、片段，浏览器端完成。">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<nav class="navbar"><div class="navbar-inner"><a href="/" class="navbar-brand"><span class="icon">🔧</span> DevTools</a><button class="theme-toggle" onclick="toggleTheme()">🌓</button></div></nav>
<div class="container">
  <div class="tool-page">
    <div class="breadcrumb"><a href="/">首页</a> / URL 解析器</div>
    <div class="tool-header"><h2>🔗 URL 解析器</h2><p>拆解网址的各个组成部分 — 浏览器端完成</p></div>
    <div class="tool-panel" style="padding:14px">
      <input type="text" id="input" placeholder="粘贴 URL..." style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:50px;font-size:0.95rem;background:var(--bg-input);color:var(--text);outline:none" oninput="parse()">
    </div>
    <div class="ad-slot horizontal">📢 广告位</div>
    <div id="output" style="display:grid;gap:8px;margin-top:8px"></div>
  </div>
</div>
<footer class="footer"><p>© 2026 DevTools</p></footer>
<script src="../script.js"></script>
<script>
function parse() {
  const v = document.getElementById('input').value.trim();
  if (!v) { document.getElementById('output').innerHTML = ''; return; }
  try {
    const u = new URL(v);
    const params = [...u.searchParams.entries()];
    const rows = [
      ['协议 (Protocol)', u.protocol],
      ['主机名 (Hostname)', u.hostname],
      ['端口 (Port)', u.port || '(默认)'],
      ['路径 (Pathname)', u.pathname],
      ['查询字符串 (Search)', u.search || '(无)'],
      ['哈希 (Hash)', u.hash || '(无)'],
      ['完整主机 (Host)', u.host],
      ['来源 (Origin)', u.origin],
    ];
    let html = rows.map(r => `<div class="tool-panel" style="padding:12px;display:flex"><span style="font-weight:600;min-width:150px;font-size:0.85rem">${r[0]}</span><code style="word-break:break-all;font-size:0.85rem">${r[1]}</code></div>`).join('');
    if (params.length) {
      html += `<div class="tool-panel" style="padding:12px"><div style="font-weight:600;font-size:0.85rem;margin-bottom:8px">📌 查询参数 (${params.length}个)</div>`;
      html += params.map(p => `<div style="display:flex;gap:8px;font-family:monospace;font-size:0.82rem;padding:4px 0"><span style="color:var(--primary);min-width:120px">${p[0]}</span><span style="word-break:break-all">${p[1]}</span></div>`).join('');
      html += '</div>';
    }
    document.getElementById('output').innerHTML = html;
  } catch(e) {
    document.getElementById('output').innerHTML = '<div class="tool-panel" style="padding:14px;color:var(--danger)">❌ 无效 URL：' + e.message + '</div>';
  }
}
document.getElementById('input').value = 'https://www.example.com:8080/path/to/page?name=test&id=123#section';
parse();
</script>
</body>
</html>
