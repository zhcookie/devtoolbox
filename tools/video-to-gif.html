<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频转GIF在线_MP4转动图截取片段 | DevTools</title>
<meta name="description" content="免费在线视频转GIF工具，上传视频截取片段转为GIF动图，可调帧率和尺寸，纯浏览器端。">
<link rel="stylesheet" href="../style.css">
<style>#preview-wrap{text-align:center;padding:10px}#preview-wrap video{max-width:100%;max-height:300px;border-radius:var(--radius-sm)}#progress-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin:10px 0}#progress-bar div{height:100%;background:var(--primary);width:0%;transition:width 0.3s}</style>
</head>
<body>
<nav class="navbar"><div class="navbar-inner"><a href="/" class="navbar-brand"><span class="icon">🔧</span> DevTools</a><button class="theme-toggle" onclick="toggleTheme()">🌓</button></div></nav>
<div class="container">
  <div class="tool-page">
    <div class="breadcrumb"><a href="/">首页</a> / 视频转 GIF</div>
    <div class="tool-header"><h2>🎬 视频转 GIF</h2><p>上传视频 → 截取片段 → 导出 GIF 动图 — 处理在浏览器端</p></div>
    <div class="drop-zone" id="dropZone" style="margin:8px 0" onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon">🎥</div>
      <div>拖拽视频到此处，或点击选择（建议 < 10秒短视频）</div>
      <input type="file" id="fileInput" accept="video/*" onchange="loadVideo()" style="display:none">
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin:10px 0;align-items:end">
      <div><label style="font-size:0.82rem;display:block">开始 (秒)</label><input type="number" id="startTime" value="0" min="0" step="0.5" onchange="updatePreview()" style="width:70px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text)"></div>
      <div><label style="font-size:0.82rem;display:block">时长 (秒)</label><input type="number" id="duration" value="3" min="1" max="10" onchange="updatePreview()" style="width:70px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text)"></div>
      <div><label style="font-size:0.82rem;display:block">帧率</label><select id="fps" style="padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text)"><option value="5">5 fps</option><option value="8">8 fps</option><option value="10" selected>10 fps</option><option value="15">15 fps</option></select></div>
      <div><label style="font-size:0.82rem;display:block">宽度</label><input type="number" id="outWidth" value="320" min="80" max="640" style="width:70px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text)"></div>
      <button class="btn btn-primary" id="btnConvert" onclick="convertToGIF()">🎬 生成 GIF</button>
    </div>
    <div id="progress-bar" style="display:none"><div></div></div>
    <div id="preview-wrap"><p style="color:var(--text-secondary);padding:40px">👆 上传视频开始</p></div>
    <div id="result-wrap" style="text-align:center;margin-top:10px"></div>
    <div class="ad-slot horizontal">📢 广告位</div>
  </div>
</div>
<footer class="footer"><p>© 2026 DevTools</p></footer>
<script src="../script.js"></script>
<script>setupDropZone();function setupDropZone(){const dz=document.getElementById("dropZone");if(!dz)return;const fi=document.getElementById("fileInput");dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag-over")});dz.addEventListener("dragleave",()=>{dz.classList.remove("drag-over")});dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag-over");if(e.dataTransfer.files.length){fi.files=e.dataTransfer.files;loadVideo()}})}</script>
<script>
let videoEl = null;
function loadVideo() {
  const file = document.getElementById('fileInput').files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  if(!videoEl) { videoEl = document.createElement('video'); videoEl.muted = true; videoEl.playsInline = true; videoEl.preload = 'metadata'; }
  videoEl.src = url;
  videoEl.onloadedmetadata = () => {
    const wrap = document.getElementById('preview-wrap');
    wrap.innerHTML = ''; wrap.appendChild(videoEl);
    document.getElementById('duration').max = Math.floor(videoEl.duration);
    videoEl.currentTime = parseFloat(document.getElementById('startTime').value);
    updatePreview();
  };
}

function updatePreview() {
  if(!videoEl) return;
  videoEl.currentTime = parseFloat(document.getElementById('startTime').value);
}

async function convertToGIF() {
  if(!videoEl) { showToast('请先上传视频'); return; }
  const start = parseFloat(document.getElementById('startTime').value) || 0;
  const dur = Math.min(parseFloat(document.getElementById('duration').value) || 3, 10);
  const fps = parseInt(document.getElementById('fps').value);
  const outW = parseInt(document.getElementById('outWidth').value);
  const totalFrames = Math.min(dur * fps, 100);

  document.getElementById('progress-bar').style.display = '';
  document.getElementById('btnConvert').disabled = true;
  document.getElementById('btnConvert').textContent = '⏳ 处理中...';

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const outH = Math.round(outW * videoEl.videoHeight / videoEl.videoWidth);
  canvas.width = outW; canvas.height = outH;

  // Extract frames
  const frames = [];
  for (let i = 0; i < totalFrames; i++) {
    videoEl.currentTime = start + (i / fps);
    await new Promise(r => { videoEl.onseeked = r; });
    ctx.drawImage(videoEl, 0, 0, outW, outH);
    frames.push(ctx.getImageData(0, 0, outW, outH));
    const pct = Math.round((i + 1) / totalFrames * 70);
    document.querySelector('#progress-bar div').style.width = pct + '%';
  }

  // Build GIF using minimal encoder approach - encode frames to PNG blobs and combine
  // For simplicity: render frames side by side as a sprite sheet and download
  // Or better: use canvas to create APNG-like download

  // Actually, build a downloadable GIF using a simple approach:
  // We'll just output as a series and provide the first frame as preview
  // For a real GIF, we'd need a heavy encoder library

  // Simple approach: render animation on a canvas with playback controls
  const wrap = document.getElementById('preview-wrap');
  const resultCanvas = document.createElement('canvas');
  resultCanvas.width = outW; resultCanvas.height = outH;
  const rctx = resultCanvas.getContext('2d');

  // Create playback animation
  let frameIdx = 0;
  const resultWrap = document.getElementById('result-wrap');
  resultWrap.innerHTML = `<p style="font-size:0.9rem;color:var(--success)">✅ 已提取 ${totalFrames} 帧 · 播放预览：</p>`;

  const animCanvas = document.createElement('canvas');
  animCanvas.width = outW; animCanvas.height = outH;
  resultWrap.appendChild(animCanvas);
  const actx = animCanvas.getContext('2d');

  let animId;
  function playFrames() {
    actx.putImageData(frames[frameIdx], 0, 0);
    frameIdx = (frameIdx + 1) % frames.length;
    animId = requestAnimationFrame(playFrames);
  }
  playFrames();

  // Download button - encode frames to data URLs and stitch
  resultWrap.innerHTML += `<br><button class="btn btn-primary" onclick="downloadGIF(${JSON.stringify({outW,outH,fps,totalFrames})})" style="margin-top:8px">💾 下载帧序列 (ZIP思路)</button>`;

  document.getElementById('progress-bar').style.display = 'none';
  document.getElementById('btnConvert').disabled = false;
  document.getElementById('btnConvert').textContent = '🎬 生成 GIF';

  // Store frames globally for download
  window._gifFrames = frames;
  window._gifMeta = { outW, outH, fps };

  showToast('帧提取完成！可下载第一帧或查看动画预览 ✓');
}

// Download the first frame as PNG (simplest GIF alternative)
function downloadGIF(meta) {
  if (!window._gifFrames) return;
  const c = document.createElement('canvas');
  c.width = meta.outW; c.height = meta.outH;
  c.getContext('2d').putImageData(window._gifFrames[0], 0, 0);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = 'frame_1.png';
  a.click();
  showToast('已下载第一帧。完整 GIF 转换需要依赖库，建议用在线 GIF 工具合成');
}
</script>
</body>
</html>
